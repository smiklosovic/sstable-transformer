version: 2
jobs:
  build:

    working_directory: ~/sstable-transformer

    docker:
      - image: cimg/openjdk:11.0.20

    steps:
      - checkout
      - restore_cache:
          keys:
            - m2-{{ checksum "pom.xml" }}
            - m2-

      - run: mvn clean install

      - save_cache:
          paths:
            - ~/.m2
          key: m2-{{ checksum "pom.xml" }}

      - store_test_results:
          path: ~/sstable-transformer/target/surefire-reports

      - store_artifacts:
          path: /tmp/artifacts

      - persist_to_workspace:
          root: /tmp/artifacts
          paths:
            - "sstable-transformer*.jar"
            - "sstable-transformer*.rpm"
            - "sstable-transformer*.deb"

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            tags:
              only: /^sstable-transformer-\d+\.\d+\.\d+$/